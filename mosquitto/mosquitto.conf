# Mosquitto MQTT Broker — Meross MSS310 local control
# The Meross firmware requires a TLS MQTT broker to complete its boot sequence.
# Without it, plugs flash green and restart in a loop.

# TLS listener (Meross devices connect on port 8883)
listener 8883
cafile /mosquitto/certs/ca.pem
certfile /mosquitto/certs/server.pem
keyfile /mosquitto/certs/server-key.pem

# Allow anonymous connections (Meross plugs don't authenticate)
allow_anonymous true

# Persistence (optional, keeps retained messages across restarts)
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type warning
log_type error
