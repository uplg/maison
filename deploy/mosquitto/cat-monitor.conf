# Host-native Mosquitto config for cat-monitor on Raspberry Pi

# Local plaintext listener for backend and Zigbee2MQTT
listener 1883 0.0.0.0

# TLS listener required by Meross devices
listener 8883 0.0.0.0
cafile /etc/mosquitto/certs/cat-monitor/ca.pem
certfile /etc/mosquitto/certs/cat-monitor/server.pem
keyfile /etc/mosquitto/certs/cat-monitor/server-key.pem

allow_anonymous true

persistence true
persistence_location /var/lib/mosquitto/

log_dest file /var/log/mosquitto/mosquitto.log
log_type warning
log_type error
